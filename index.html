<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Speed Test</title>
  <link rel="stylesheet" href="style.css" />
  
</head>
<body>
  <div class="app">
    <header>
      <h1>Typing Speed Test</h1>
      <div class="controls">
        <label for="difficulty">Difficulty:</label>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium">Medium</option>
          <option value="hard">Hard</option>
        </select>

        <label for="mode">Mode:</label>
        <select id="mode">
          <option value="timed">Timed</option>
          <option value="passage">Passage</option>
        </select>

        <label for="duration">Duration:</label>
        <select id="duration">
          <option value="80">80s</option>
          <option value="120">120s</option>
          <option value="140" selected>140s</option>
          <option value="160">160s</option>
        </select>

        <button id="restart">Restart</button>
      </div>
    </header>

    <section class="stats" aria-live="polite">
      <div>Time: <span id="time">0</span></div>
      <div>WPM: <span id="wpm">0</span></div>
      <div>Accuracy: <span id="accuracy">100</span>%</div>
    </section>

    <section id="passage" tabindex="0" aria-label="Typing passage"></section>

    <section class="results hidden" aria-live="polite">
      <h2 id="result-message"></h2>
      <p>WPM: <span id="final-wpm"></span></p>
      <p>Accuracy: <span id="final-accuracy"></span>%</p>
      <p>Characters: <span id="char-stats"></span></p>
    </section>
  </div>

  <!-- Confetti library -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
